version: '3.8'

services:
  db:
    image: mysql:8.0-debian
    container_name: electro_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: electrostudent_assistant
    ports:
      - "3307:3306"
    volumes:
      - ./backend/mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: electro_backend
    ports:
      - "5000:5000"
    environment:

      - DB_HOST=db
      - FLASK_DEBUG=1
    command: sh -c "python manage.py db upgrade && python seed.py && python seed_components.py && python manage.py run --host 0.0.0.0"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/flask_session:/app/flask_session
    tty: true
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: electro_frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://localhost:5000
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    tty: true
    depends_on:
      - backend